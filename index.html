<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Конвертер валют</title>
  <link rel="stylesheet" href="/src/style.css">
  <script type="module" src="/src/main.js"></script>
  <link rel="icon" type="image/png" href="/17143960.png">


</head>


<body>
  <div class="container">
    <div class="header">
      <h1>Конвертер валют</h1>
      <div class="update">
        Курсы обновлены: <span id="last-updated">📅date📅</span>
      </div>
    </div>
    <div class="first">
    </div>
    <div class="first">
      <div class="summa">
        <span>💵Сумма:</span>
        <input type="" class="sum" , placeholder="Введите сумму">
      </div>
      <div class="card">
        <div class="currency-row">
          <div class="currency-box">
            <h2>Из валюты:</h2>
            <select>
              <option value="RUB">Рубль</option>
              <option value="USD">Доллар</option>
              <option value="EUR">Евро</option>
              <option value="KZT">Теньге</option>
              <option value="UAH">Гривны</option>
            </select>
          </div>
          <div class="currency-box">
            <h2>В валюту:</h2>
            <select>
              <option value="RUB">Рубль</option>
              <option value="USD">Доллар</option>
              <option value="EUR">Евро</option>
              <option value="KZT">Теньге</option>
              <option value="UAH">Гривны</option>
            </select>
          </div>
        </div>
      </div>
      <button id="convert-btn">🔄 Конвертировать</button>

      <div class="result">
        <span>Результат:</span>
        <p class="res">Введите сумму</p>
      </div>

      <div class="black-line"></div>

      <div class="history">
        <h3>История Операций</h3>
        <div class="history_list">
        </div>
      </div>
    </div>
    <div class="clearButton">
      <button id="clear-btn">Очистить историю</button>
    </div>
  </div>
</body>

</html>
